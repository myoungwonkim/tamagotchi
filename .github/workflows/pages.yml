name: Deploy game to GitHub Pages (/abysspet/)

# Publishes the web game under https://nolsoopgames.com/abysspet/ while keeping
# the source tree at the repo root (so sprite/build scripts stay unchanged).
# One-time setup: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble _site with game under /abysspet/
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/abysspet

          # Game runtime (relative paths resolve under /abysspet/)
          cp index.html _site/abysspet/index.html
          cp privacy.html _site/abysspet/privacy.html
          cp terms-of-service.html _site/abysspet/terms-of-service.html
          cp -R css _site/abysspet/css
          cp -R js _site/abysspet/js
          mkdir -p _site/abysspet/assets
          cp -R assets/sprites _site/abysspet/assets/sprites
          # App logo referenced by granite.config.ts icon URL
          [ -d assets/ait-store ] && cp -R assets/ait-store _site/abysspet/assets/ait-store

          # Disable Jekyll processing (keeps files starting with _ etc.)
          touch _site/.nojekyll _site/abysspet/.nojekyll

          # Custom domain
          cp CNAME _site/CNAME

          # Root + legacy redirects → canonical /abysspet/ URLs
          make_redirect() {
            target="$1"; out="$2"
            printf '<!DOCTYPE html>\n<html lang="ko"><head><meta charset="UTF-8">\n<link rel="canonical" href="%s">\n<meta http-equiv="refresh" content="0; url=%s">\n<script>location.replace("%s");</script>\n</head><body><p><a href="%s">%s</a></p></body></html>\n' "$target" "$target" "$target" "$target" "$target" > "$out"
          }
          make_redirect "https://nolsoopgames.com/abysspet/" _site/index.html
          make_redirect "https://nolsoopgames.com/abysspet/privacy.html" _site/privacy.html
          make_redirect "https://nolsoopgames.com/abysspet/terms-of-service.html" _site/terms-of-service.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
