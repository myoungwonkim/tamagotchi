<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a2028">
  <title>말풍선 시안 — 심플 6종</title>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a2028;
    --surface: #0f2f39;
    --text: #cfe6ec;
    --text-muted: #6a8b94;
    --accent: #45c8dc;
    --border-subtle: #20464f;
    --pet-viewport-bg: linear-gradient(180deg, #57b4d2 0%, #3f9cbe 60%, #348fb0 100%);
    --pet-border: #6fb6d0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding:
      calc(22px + env(safe-area-inset-top))
      calc(14px + env(safe-area-inset-right))
      calc(48px + env(safe-area-inset-bottom))
      calc(14px + env(safe-area-inset-left));
    line-height: 1.5;
  }

  .page-head { max-width: 1180px; margin: 0 auto 6px; text-align: center; }
  .page-head h1 { font-size: 1.125rem; font-weight: 700; margin-bottom: 6px; }
  .page-head p { font-size: 0.8125rem; color: #8fb4c4; max-width: 640px; margin: 0 auto; }
  .page-head strong { color: #bfe6f2; }

  .controls {
    position: sticky; top: 0; z-index: 20;
    max-width: 1180px; margin: 16px auto 22px;
    display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
    gap: 8px 12px; padding: 12px 14px;
    background: #10303a; border: 1px solid var(--border-subtle); border-radius: 12px;
    -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
  }
  .btn {
    font: inherit; font-size: 0.75rem; font-weight: 600;
    color: #dff0f6; background: #17414e; border: 1px solid #2f5d6c;
    border-radius: 8px; padding: 7px 12px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: background .15s, border-color .15s;
  }
  .btn:active { background: #1e5162; }
  .btn--primary { background: #256e83; border-color: #3f97ad; color: #fff; }
  .controls .lbl { font-size: 0.6875rem; color: #8fb4c4; }
  .controls .cur { font-size: 0.6875rem; color: #bfe6f2; font-weight: 600; }

  .gallery {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 22px; max-width: 1180px; margin: 0 auto;
  }
  .card { background: #12313b; border: 1px solid #223f48; border-radius: 16px; padding: 12px 12px 14px; }
  .card--baseline { border-color: #5a4636; opacity: 0.95; }
  .card--pick { border-color: #45c8dc; box-shadow: 0 0 0 1px rgba(69,200,220,0.3); }
  .card__head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .card__head h2 { font-size: 0.9375rem; font-weight: 700; color: #eaf6fb; }
  .tag { font-size: 0.5625rem; font-weight: 700; letter-spacing: .05em; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
  .tag--baseline { background: #5a4636; color: #f0e0cc; }
  .tag--pick { background: #256e83; color: #fff; }
  .card__desc { font-size: 0.6875rem; color: #86a6b4; margin: 4px 0 10px; min-height: 3.6em; }

  /* ===== 미니 펫 화면 ===== */
  .stage {
    position: relative; height: 250px; border-radius: 12px; overflow: hidden;
    border: 2px solid var(--pet-border);
    background: var(--pet-viewport-bg);
    box-shadow: inset 0 0 40px rgba(16,74,104,0.28);
    isolation: isolate;
  }
  .water { position: absolute; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
  .water span {
    position: absolute; bottom: -20px; border-radius: 50%;
    background: radial-gradient(circle at 34% 30%, rgba(255,255,255,.85), rgba(255,255,255,.2) 55%, transparent 72%);
    animation: bubbleRise linear infinite;
  }
  @keyframes bubbleRise { 0%{transform:translateY(0);opacity:0} 15%{opacity:.85} 100%{transform:translateY(-250px);opacity:0} }
  .water span:nth-child(1){left:16%;width:7px;height:7px;animation-duration:12s;animation-delay:-2s}
  .water span:nth-child(2){left:44%;width:5px;height:5px;animation-duration:9s;animation-delay:-5s}
  .water span:nth-child(3){left:72%;width:9px;height:9px;animation-duration:15s;animation-delay:-8s}
  .water span:nth-child(4){left:86%;width:5px;height:5px;animation-duration:11s;animation-delay:-3s}

  .pet {
    position: absolute; left: 50%; top: 58%; transform: translate(-50%,-50%);
    width: 92px; height: auto; z-index: 4;
    image-rendering: pixelated; image-rendering: crisp-edges;
    filter: drop-shadow(0 7px 10px rgba(6,40,62,.4));
    animation: petFloat 4.5s ease-in-out infinite;
  }
  @keyframes petFloat { 0%,100%{transform:translate(-50%,-50%)} 50%{transform:translate(-50%,calc(-50% - 8px))} }

  /* ===== 기분 풍선: 현재 게임과 동일 (원본 유지) ===== */
  .mood {
    position: absolute; z-index: 7; top: 16%; right: 20%;
    width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface); border: 2px solid var(--border-subtle);
    box-shadow: 0 2px 0 rgba(0,0,0,.2); padding: 5px;
    animation: moodFade .5s ease;
  }
  .mood img { width: 30px; height: 30px; image-rendering: pixelated; image-rendering: crisp-edges; }
  .mood::before {
    content: ""; position: absolute; top: 58%; left: -9px;
    width: 0; height: 0; border-style: solid; border-width: 5px 9px 5px 0;
    border-color: transparent var(--border-subtle) transparent transparent;
  }
  .mood::after {
    content: ""; position: absolute; top: 58%; left: -6px;
    width: 0; height: 0; border-style: solid; border-width: 4px 7px 4px 0;
    border-color: transparent var(--surface) transparent transparent;
  }
  @keyframes moodFade { 0%{opacity:.4;transform:scale(.92)} 100%{opacity:1;transform:scale(1)} }

  /* ============================================================
     말풍선 — 심플 계열 (펫 위 · 작은 아래 꼬리)
     ============================================================ */
  .msg {
    position: absolute; z-index: 6; left: 50%; top: 16px; transform: translateX(-50%);
    max-width: 84%; font-size: 0.74rem; font-weight: 600; text-align: center;
    padding: 8px 14px; line-height: 1.3; white-space: nowrap;
  }
  /* 공통 등장/부양 (절제된 액션) */
  @keyframes sIn { from{opacity:0;transform:translateX(-50%) translateY(-6px) scale(.96)} to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)} }
  @keyframes sFloat { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-3px)} }
  .msg.is-in { animation: sIn .35s ease both, sFloat 3.6s ease-in-out .35s infinite; }

  /* 0) 현재(기준): 상단 전체 폭 반투명 바 */
  .msg--v0 {
    left:0; right:0; top:0; transform:none; max-width:none; white-space:normal;
    border-radius: 12px 12px 0 0;
    background: rgba(12,40,49,0.96); color:#cfe6ec;
    border-bottom: 1px solid var(--border-subtle);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    animation: v0Pop .4s ease;
  }
  @keyframes v0Pop { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

  /* 1) 소프트 화이트 */
  .msg--s1 { background:#ffffff; color:#153039; border-radius:14px; box-shadow:0 4px 12px rgba(0,20,30,.28); }
  .msg--s1::after { content:""; position:absolute; left:50%; bottom:-6px; transform:translateX(-50%); border:7px solid transparent; border-top-color:#ffffff; border-bottom:0; }

  /* 2) 잉크 (현재색 · 둥근 말풍선) */
  .msg--s2 { background: rgba(12,40,49,0.96); color:#cfe6ec; border:1px solid var(--border-subtle); border-radius:14px; box-shadow:0 4px 12px rgba(0,0,0,.3); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }
  .msg--s2::after { content:""; position:absolute; left:50%; bottom:-7px; transform:translateX(-50%); border:7px solid transparent; border-top-color:rgba(12,40,49,0.96); border-bottom:0; }

  /* 3) 소프트 시안 */
  .msg--s3 { background:#e3f6fb; color:#0a3038; border-radius:14px; box-shadow:0 4px 12px rgba(0,30,45,.24); }
  .msg--s3::after { content:""; position:absolute; left:50%; bottom:-6px; transform:translateX(-50%); border:7px solid transparent; border-top-color:#e3f6fb; border-bottom:0; }

  /* 4) 글래스 (프로스트) */
  .msg--s4 { background: rgba(10,32,40,.55); color:#eafcff; border:1px solid rgba(255,255,255,.16); border-radius:14px; box-shadow:0 4px 14px rgba(0,0,0,.22); -webkit-backdrop-filter: blur(9px); backdrop-filter: blur(9px); }
  .msg--s4::after { content:""; position:absolute; left:50%; bottom:-6px; transform:translateX(-50%); border:7px solid transparent; border-top-color:rgba(10,32,40,.55); border-bottom:0; }

  /* 5) 라인 (아웃라인) */
  .msg--s5 { background: rgba(8,28,35,.5); color:#eafcff; border:1.5px solid var(--accent); border-radius:14px; box-shadow:0 0 12px rgba(69,200,220,.18); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }
  .msg--s5::after { content:""; position:absolute; left:50%; bottom:-8px; transform:translateX(-50%); border:7px solid transparent; border-top-color:var(--accent); border-bottom:0; }
  .msg--s5::before { content:""; position:absolute; left:50%; bottom:-6px; transform:translateX(-50%); border:6px solid transparent; border-top-color:#0b232c; border-bottom:0; z-index:1; }

  /* 6) 미니 알약 */
  .msg--s6 { background:#ffffff; color:#153039; border-radius:999px; padding:7px 16px; box-shadow:0 4px 12px rgba(0,20,30,.26); }
  .msg--s6::after { content:""; position:absolute; left:50%; bottom:-6px; transform:translateX(-50%); border:6px solid transparent; border-top-color:#ffffff; border-bottom:0; }

  .back-link { display:block; text-align:center; margin-top:30px; font-size:0.8125rem; }
  .back-link a { color:#7fb8cd; text-decoration:none; }

  @media (prefers-reduced-motion: reduce) {
    .pet, .water span, .msg, .mood { animation: none !important; }
  }
  </style>
</head>
<body>
  <header class="page-head">
    <h1>말풍선 시안 — 심플 6종</h1>
    <p><strong>기분 풍선은 현재 게임 그대로</strong> 두고, 펫 창의 <strong>말풍선만</strong> 심플하게. 깔끔한 라운드 말풍선 + <strong>부드러운 팝 · 은은한 부양</strong>만 (과한 테두리·흔들림 없음). 아직 게임에는 반영하지 않았습니다.</p>
  </header>

  <div class="controls">
    <button type="button" class="btn btn--primary" id="replay">↻ 다시 재생</button>
    <button type="button" class="btn" id="cycle">💬 메시지 바꾸기</button>
    <span class="lbl">현재:</span><span class="cur" id="cur"></span>
  </div>

  <div class="gallery" id="gallery"></div>

  <p class="back-link"><a href="index.html">← 시안 허브로</a></p>

  <script>
    const PET = "../assets/sprites/adult/standard.png";
    const MOOD = "../assets/sprites/mood/happy.png";

    const MESSAGES = [
      "흥, 관심 없어.",
      "밥 줘… 당장!",
      "또 너야?",
      "심심해 죽겠어.",
      "…고마워. (조금)",
    ];
    let msgIdx = 0;

    const VARIANTS = [
      { id:"v0", name:"현재", tag:"BASELINE", tagClass:"tag--baseline", cardClass:"card--baseline",
        desc:"지금 게임 — 상단 전체 폭 반투명 바. 비교 기준." },
      { id:"s1", name:"소프트 화이트", tag:"추천", tagClass:"tag--pick", cardClass:"card--pick",
        desc:"흰 라운드 말풍선 + 부드러운 그림자. 테두리 없이 가장 깔끔. 살짝 팝 후 은은한 부양." },
      { id:"s2", name:"잉크(현재색)", tag:"추천", tagClass:"tag--pick", cardClass:"card--pick",
        desc:"지금 색 그대로, 상단 바 → 펫 위 둥근 말풍선으로만 변경. 변화 폭 최소·안전." },
      { id:"s3", name:"소프트 시안", tag:"", tagClass:"", cardClass:"",
        desc:"연한 시안 톤. 밝은 바다와 자연스럽게 어울리는 부드러운 느낌." },
      { id:"s4", name:"글래스", tag:"", tagClass:"", cardClass:"",
        desc:"반투명 프로스트 유리. 배경이 살짝 비쳐 가볍고 모던." },
      { id:"s5", name:"라인", tag:"", tagClass:"", cardClass:"",
        desc:"얇은 시안 아웃라인만. 채움 최소로 가장 미니멀·정갈." },
      { id:"s6", name:"미니 알약", tag:"", tagClass:"", cardClass:"",
        desc:"둥근 알약형. 짧은 대사에 잘 맞는 아담하고 귀여운 심플." },
    ];

    const gallery = document.getElementById("gallery");
    const curEl = document.getElementById("cur");
    curEl.textContent = MESSAGES[msgIdx];

    VARIANTS.forEach((v) => {
      const card = document.createElement("article");
      card.className = "card" + (v.cardClass ? " " + v.cardClass : "");
      const tagHTML = v.tag ? `<span class="tag ${v.tagClass}">${v.tag}</span>` : "";
      card.innerHTML = `
        <div class="card__head"><h2>${v.name}</h2>${tagHTML}</div>
        <p class="card__desc">${v.desc}</p>
        <div class="stage">
          <div class="water"><span></span><span></span><span></span><span></span></div>
          <div class="msg msg--${v.id} is-in">${MESSAGES[msgIdx]}</div>
          <img class="pet" src="${PET}" alt="">
          <div class="mood"><img src="${MOOD}" alt=""></div>
        </div>`;
      gallery.append(card);
    });

    function replay() {
      document.querySelectorAll(".msg").forEach((el) => {
        el.classList.remove("is-in");
        void el.offsetWidth;
        el.classList.add("is-in");
      });
    }
    document.getElementById("replay").addEventListener("click", replay);

    document.getElementById("cycle").addEventListener("click", () => {
      msgIdx = (msgIdx + 1) % MESSAGES.length;
      curEl.textContent = MESSAGES[msgIdx];
      document.querySelectorAll(".msg").forEach((el) => { el.textContent = MESSAGES[msgIdx]; });
      replay();
    });
  </script>
</body>
</html>
