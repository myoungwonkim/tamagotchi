<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fef6e4">
  <title>배경색 시안 — 현재 UI</title>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    background: #2a2824;
    color: #e8e4dc;
    padding:
      calc(20px + env(safe-area-inset-top))
      calc(12px + env(safe-area-inset-right))
      calc(40px + env(safe-area-inset-bottom))
      calc(12px + env(safe-area-inset-left));
    line-height: 1.45;
  }

  .page-head { max-width: 1100px; margin: 0 auto 18px; text-align: center; }
  .page-head h1 { font-size: 1.0625rem; font-weight: 700; margin-bottom: 6px; }
  .page-head p { font-size: 0.8125rem; color: #a8a098; max-width: 560px; margin: 0 auto; }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .swatch-card {
    background: #1e1c1a;
    border: 1px solid #3a3834;
    border-radius: 14px;
    padding: 12px;
  }

  .swatch-card--current { border-color: #c8a878; }

  .swatch-card__head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .swatch-card__head h2 { font-size: 0.875rem; font-weight: 700; color: #f5f0e8; }
  .swatch-card__head code {
    font-size: 0.6875rem;
    color: #c8b898;
    background: #2a2824;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .swatch-card__desc { font-size: 0.6875rem; color: #8a8478; margin-bottom: 10px; }

  .tag-current {
    display: inline-block;
    font-size: 0.5625rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #fff;
    background: #a87848;
    padding: 2px 7px;
    border-radius: 999px;
    margin-bottom: 6px;
  }

  /* ===== 미니 폰 (현재 UI, --bg 만 변경) ===== */
  .phone {
    --bg: #fef6e4;
    --surface: #ffffff;
    --text: #2d2a26;
    --text-muted: #6b6560;
    --accent: #e05a8a;
    --radius: 16px;
    --shadow: 0 4px 20px rgba(45, 42, 38, 0.08);

    background: var(--bg);
    color: var(--text);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(45,42,38,0.12);
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    min-height: 420px;
    display: flex;
    flex-direction: column;
    font-size: 0.6875rem;
  }

  .app-mock {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 8px 10px 10px;
    gap: 8px;
  }

  .header-mock {
    text-align: center;
    padding: 2px 28px 4px;
    position: relative;
  }

  .icon-btn {
    position: absolute; top: 0;
    width: 26px; height: 26px;
    border: none;
    border-radius: 8px;
    background: var(--surface);
    box-shadow: var(--shadow);
    font-size: 0.75rem;
    cursor: default;
  }
  .icon-btn--left { left: 0; }
  .icon-btn--right { right: 0; }

  .pet-name { font-size: 0.9375rem; font-weight: 700; }
  .pet-meta { font-size: 0.625rem; color: var(--text-muted); margin-top: 1px; }
  .pet-stage { font-size: 0.625rem; font-weight: 600; color: var(--accent); }

  .pet-area {
    position: relative;
    flex: 1;
    min-height: 150px;
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .message {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 2;
    text-align: center;
    font-size: 0.5625rem;
    font-weight: 600;
    padding: 5px 8px;
    background: rgba(255,255,255,0.94);
    color: var(--text);
    border-bottom: 1px solid rgba(45,42,38,0.06);
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .pet-area img {
    width: clamp(4rem, 42%, 5.5rem);
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .stats {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 8px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .stat {
    display: grid;
    grid-template-columns: 36px 1fr 24px;
    align-items: center;
    gap: 5px;
    font-size: 0.5625rem;
  }

  .stat label { color: var(--text-muted); }
  .stat-val { text-align: right; color: var(--text-muted); }

  .stat-bar {
    height: 8px;
    background: #eee8df;
    border-radius: 4px;
    overflow: hidden;
  }

  .stat-fill { height: 100%; border-radius: 4px; }
  .stat-fill--h { width: 62%; background: #ff9f43; }
  .stat-fill--p { width: 48%; background: #f582ae; }
  .stat-fill--c { width: 35%; background: #58c4dc; }
  .stat-fill--x { width: 88%; background: #7bc47f; }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 4px;
    min-height: 48px;
    border: none;
    border-radius: var(--radius);
    background: var(--surface);
    box-shadow: var(--shadow);
    cursor: default;
    font-size: 0.5625rem;
    font-weight: 600;
    color: var(--text);
  }

  .action-btn img {
    width: 26px; height: 26px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .action-btn--feed { background: #fff3e6; }
  .action-btn--play { background: #fde8f0; }
  .action-btn--clean { background: #e8f7fb; }
  .action-btn--sleep { background: #e8eef8; }

  .color-chip {
    width: 100%;
    height: 28px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    margin-top: 10px;
  }

  .back-link { display: block; text-align: center; margin-top: 22px; font-size: 0.75rem; }
  .back-link a { color: #c8b090; text-decoration: none; }
  </style>
</head>
<body>
  <header class="page-head">
    <h1>배경색 시안</h1>
    <p>현재 UI 그대로 — <code style="color:#e8dcc8">--bg</code> 베이지 배경만 바꿨습니다. 카드·버튼·액센트 색은 동일합니다.</p>
  </header>

  <div class="gallery" id="gallery"></div>

  <p class="back-link"><a href="index.html">← 시안 허브로</a></p>

  <script>
    const PET = "../assets/sprites/adult/grumpy.png";
    const ICONS = {
      feed: "../assets/sprites/ui/feed.png",
      play: "../assets/sprites/ui/play.png",
      clean: "../assets/sprites/ui/clean.png",
      sleep: "../assets/sprites/ui/sleep.png",
    };

    const BACKGROUNDS = [
      { id: "current", name: "현재", hex: "#fef6e4", desc: "지금 게임과 동일한 크림 베이지", current: true },
      { id: "warm", name: "따뜻한 크림", hex: "#faf0dc", desc: "노란기 살짝 — 아늑한 실내 조명" },
      { id: "parchment", name: "양피지", hex: "#f5f0e8", desc: "중성·차분 — 눈 피로 적음" },
      { id: "sand", name: "모래", hex: "#ede4d4", desc: "갈기 도는 해변 모래, 심해와 대비" },
      { id: "blush", name: "블러시 베이지", hex: "#f2ebe6", desc: "핑크 액센트와 톤 맞춤" },
      { id: "seafoam", name: "해초 베이지", hex: "#eef2ea", desc: "녹청 한 방울 — 심해 힌트" },
      { id: "tan", name: "깊은 탄", hex: "#e8dcc8", desc: "어두운 베이지 — 대비 강화" },
      { id: "mist", name: "안개 백색", hex: "#faf8f4", desc: "거의 흰색 — 가장 밝고 깨끗" },
      { id: "driftwood", name: "표류목", hex: "#e6ddd0", desc: "회갈색 베이지 — 차분·차분" },
    ];

    const MOCK_INNER = `
      <div class="app-mock">
        <header class="header-mock">
          <button type="button" class="icon-btn icon-btn--left" aria-hidden="true">📖</button>
          <button type="button" class="icon-btn icon-btn--right" aria-hidden="true">🔊</button>
          <h3 class="pet-name">송곳니어</h3>
          <p class="pet-meta">47일째</p>
          <p class="pet-stage">성체 · 송곳니어</p>
        </header>
        <div class="pet-area">
          <p class="message">후회할 거야, 키운 거.</p>
          <img src="${PET}" alt="">
        </div>
        <section class="stats">
          <div class="stat"><label>배고픔</label><div class="stat-bar"><div class="stat-fill stat-fill--h"></div></div><span class="stat-val">62</span></div>
          <div class="stat"><label>행복</label><div class="stat-bar"><div class="stat-fill stat-fill--p"></div></div><span class="stat-val">48</span></div>
          <div class="stat"><label>청결</label><div class="stat-bar"><div class="stat-fill stat-fill--c"></div></div><span class="stat-val">35</span></div>
          <div class="stat"><label>건강</label><div class="stat-bar"><div class="stat-fill stat-fill--x"></div></div><span class="stat-val">88</span></div>
        </section>
        <footer class="actions">
          <button type="button" class="action-btn action-btn--feed"><img src="${ICONS.feed}" alt=""><span>먹이</span></button>
          <button type="button" class="action-btn action-btn--play"><img src="${ICONS.play}" alt=""><span>놀이</span></button>
          <button type="button" class="action-btn action-btn--clean"><img src="${ICONS.clean}" alt=""><span>청소</span></button>
          <button type="button" class="action-btn action-btn--sleep"><img src="${ICONS.sleep}" alt=""><span>재우기</span></button>
        </footer>
      </div>
    `;

    const gallery = document.getElementById("gallery");

    for (const bg of BACKGROUNDS) {
      const card = document.createElement("article");
      card.className = "swatch-card" + (bg.current ? " swatch-card--current" : "");
      card.innerHTML = `
        ${bg.current ? '<span class="tag-current">CURRENT</span>' : ""}
        <div class="swatch-card__head">
          <h2>${bg.name}</h2>
          <code>${bg.hex}</code>
        </div>
        <p class="swatch-card__desc">${bg.desc}</p>
        <div class="phone" style="--bg: ${bg.hex}">${MOCK_INNER}</div>
        <div class="color-chip" style="background: ${bg.hex}" title="${bg.hex}"></div>
      `;
      gallery.append(card);
    }
  </script>
</body>
</html>
