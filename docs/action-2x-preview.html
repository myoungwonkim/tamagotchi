<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>액션 이펙트 2배 확대 시안 (STAGING ONLY)</title>
<style>
  :root {
    --bg: #12131a;
    --card: #1c1e28;
    --card-border: #2c2f3d;
    --text: #e8eaf2;
    --muted: #9aa0b4;
    --accent: #ffcc4d;
    --staging: #ff5f6d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px 16px 64px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  .title-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  h1 { font-size: 1.6rem; margin: 0; }
  .staging-tag {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #fff;
    background: var(--staging);
    padding: 3px 8px;
    border-radius: 6px;
    text-transform: uppercase;
  }
  .subline { color: var(--muted); margin: 8px 0 0; font-size: 0.92rem; line-height: 1.5; }

  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 18px;
    margin: 20px 0 28px;
  }
  .controls label { font-size: 0.9rem; color: var(--muted); display: inline-flex; align-items: center; gap: 8px; }
  .controls select {
    background: #262936;
    color: var(--text);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.9rem;
  }
  .controls input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }

  .cards { display: grid; grid-template-columns: 1fr; gap: 18px; }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 28px;
    flex-wrap: wrap;
  }
  .card__head { min-width: 120px; }
  .card__label { font-size: 1.15rem; font-weight: 700; }
  .card__key { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  .compare { display: flex; align-items: flex-end; gap: 24px; }
  .compare__item { text-align: center; }
  .compare__cap { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }

  .fx-box { position: relative; display: inline-block; }
  .fx-box.size-2x { width: clamp(4rem, 18vw, 5.5rem); height: clamp(4rem, 18vw, 5.5rem); }
  .fx-box.size-1x { width: clamp(2rem, 9vw, 2.75rem); height: clamp(2rem, 9vw, 2.75rem); }
  .fx-box img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    opacity: 0;
    transition: opacity 0.05s linear;
  }
  .fx-box img.on { opacity: 1; }

  .strip { display: flex; gap: 10px; margin-left: auto; }
  .strip__frame { text-align: center; }
  .strip__frame img {
    width: 56px;
    height: 56px;
    object-fit: contain;
    image-rendering: pixelated;
    background: #0f1016;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    display: block;
  }
  .strip__cap { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

  .note {
    margin-top: 32px;
    background: #1a1c26;
    border: 1px dashed var(--card-border);
    border-radius: 12px;
    padding: 16px 18px;
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .note code {
    background: #262936;
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 5px;
    font-size: 0.85em;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title-row">
      <h1>액션 이펙트 2배 확대 시안</h1>
      <span class="staging-tag">STAGING ONLY · 게임 미반영</span>
    </div>
    <p class="subline">먹이·놀이·청소·재우기·깨우기 이펙트 그래픽 사이즈 2배 확대 검토용. 게임 미반영.</p>
  </header>

  <div class="controls">
    <label>속도
      <select id="speed">
        <option value="200">빠름 (200ms)</option>
        <option value="350" selected>보통 (350ms)</option>
        <option value="500">느림 (500ms)</option>
      </select>
    </label>
    <label>
      <input type="checkbox" id="pingpong">
      왕복 재생 (a→b→c→b→a…)
    </label>
  </div>

  <div class="cards" id="cards"></div>

  <div class="note">
    <strong>적용 시 변경 사항</strong><br>
    적용 시 css/style.css의 <code>.care-fx__particle</code> 크기를
    <code>clamp(2rem, 9vw, 2.75rem)</code> → <code>clamp(4rem, 18vw, 5.5rem)</code> 로 변경 (약 2배).
  </div>
</div>

<script>
  const ACTIONS = [
    { key: "feed",  label: "먹이",   desc: "shrimp eaten" },
    { key: "play",  label: "놀이",   desc: "ball bounce" },
    { key: "clean", label: "청소",   desc: "broom sweep" },
    { key: "sleep", label: "재우기", desc: "moon + Zzz" },
    { key: "wake",  label: "깨우기", desc: "sun rays" },
  ];
  const FRAMES = ["a", "b", "c"];
  const V = "action-2x-preview";

  const cardsEl = document.getElementById("cards");
  const speedEl = document.getElementById("speed");
  const pingpongEl = document.getElementById("pingpong");

  const anims = [];

  function makeFxBox(action, sizeClass, caption) {
    const item = document.createElement("div");
    item.className = "compare__item";

    const box = document.createElement("div");
    box.className = "fx-box " + sizeClass;
    const imgs = FRAMES.map((f, i) => {
      const img = document.createElement("img");
      img.src = `../assets/sprites/ui/action-frames/${action}-${f}.png?v=${V}`;
      img.alt = `${action}-${f}`;
      if (i === 0) img.classList.add("on");
      box.appendChild(img);
      return img;
    });
    anims.push(imgs);

    const cap = document.createElement("div");
    cap.className = "compare__cap";
    cap.textContent = caption;

    item.appendChild(box);
    item.appendChild(cap);
    return item;
  }

  ACTIONS.forEach(({ key, label, desc }) => {
    const card = document.createElement("div");
    card.className = "card";

    const head = document.createElement("div");
    head.className = "card__head";
    head.innerHTML = `<div class="card__label">${label}</div><div class="card__key">${key} · ${desc}</div>`;

    const compare = document.createElement("div");
    compare.className = "compare";
    compare.appendChild(makeFxBox(key, "size-1x", "현재 (1x)"));
    compare.appendChild(makeFxBox(key, "size-2x", "확대 (2x)"));

    const strip = document.createElement("div");
    strip.className = "strip";
    FRAMES.forEach((f) => {
      const fr = document.createElement("div");
      fr.className = "strip__frame";
      const img = document.createElement("img");
      img.src = `../assets/sprites/ui/action-frames/${key}-${f}.png?v=${V}`;
      img.alt = `${key}-${f}`;
      const cap = document.createElement("div");
      cap.className = "strip__cap";
      cap.textContent = f.toUpperCase();
      fr.appendChild(img);
      fr.appendChild(cap);
      strip.appendChild(fr);
    });

    card.appendChild(head);
    card.appendChild(compare);
    card.appendChild(strip);
    cardsEl.appendChild(card);
  });

  let idx = 0;
  let dir = 1;
  let timer = null;

  function step() {
    anims.forEach((imgs) => {
      imgs.forEach((img, i) => img.classList.toggle("on", i === idx));
    });
    if (pingpongEl.checked) {
      idx += dir;
      if (idx >= FRAMES.length - 1) { idx = FRAMES.length - 1; dir = -1; }
      else if (idx <= 0) { idx = 0; dir = 1; }
    } else {
      idx = (idx + 1) % FRAMES.length;
      dir = 1;
    }
  }

  function restart() {
    if (timer) clearInterval(timer);
    idx = 0;
    dir = 1;
    anims.forEach((imgs) => imgs.forEach((img, i) => img.classList.toggle("on", i === 0)));
    timer = setInterval(step, Number(speedEl.value));
  }

  speedEl.addEventListener("change", restart);
  pingpongEl.addEventListener("change", restart);
  restart();
</script>
</body>
</html>
