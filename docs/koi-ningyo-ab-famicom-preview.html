<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>심해인어 · 시안 A/B 픽셀</title>
<style>
  :root {
    --bg: #0a141d; --panel: #101f2b;
    --stage-top: #57b4d2; --stage-bot: #348fb0;
    --ink: #d8ecf8; --muted: #8fb0c6;
    --line: rgba(120,170,200,.16);
    --tag-a: #c45; --tag-b: #3a8e9e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: system-ui, sans-serif; padding: 40px 20px 60px; }
  h1 { text-align: center; font-size: 22px; margin: 0 0 6px; }
  .sub { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px; margin-left: 4px;
    color: #fff;
  }
  .badge.fc { background: #5a6a7a; }
  .badge.a { background: var(--tag-a); }
  .badge.b { background: var(--tag-b); }
  section { max-width: 720px; margin: 0 auto 36px; }
  section h2 { font-size: 16px; margin: 0 0 14px; text-align: center; }
  .row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  .box {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px; width: 300px; text-align: center;
  }
  .box h3 { font-size: 14px; color: var(--muted); margin: 0 0 12px; }
  .stage {
    border-radius: 12px; background: linear-gradient(180deg, var(--stage-top), var(--stage-bot));
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  }
  .stage img { width: 82%; height: 82%; object-fit: contain; }
  .stage img.pix { image-rendering: pixelated; }
</style>
</head>
<body>
  <h1>시안 A/B · FC 픽셀 스테이징 <span class="badge fc">FC</span></h1>
  <p class="sub">90년대 페미콤 느낌 (제한 팔레트·가벼운 디더·1px 아웃라인) · 256×256 · 펫 스테이지 배경</p>

  <section>
    <h2>시안 A · 표본 충실형 <span class="badge a">錦鯉</span></h2>
    <div class="row">
      <div class="box">
        <h3>HQ 원본</h3>
        <div class="stage"><img src="../assets/custom/koi-ningyo-1.png" alt="A HQ"></div>
      </div>
      <div class="box">
        <h3>픽셀 보정</h3>
        <div class="stage"><img class="pix" src="../assets/custom/koi-ningyo-1-pixel.png" alt="A pixel"></div>
      </div>
    </div>
  </section>

  <section>
    <h2>시안 B · 심해 적응형 <span class="badge b">심해</span></h2>
    <div class="row">
      <div class="box">
        <h3>HQ 원본</h3>
        <div class="stage"><img src="../assets/custom/koi-ningyo-2.png" alt="B HQ"></div>
      </div>
      <div class="box">
        <h3>픽셀 보정</h3>
        <div class="stage"><img class="pix" src="../assets/custom/koi-ningyo-2-pixel.png" alt="B pixel"></div>
      </div>
    </div>
  </section>
</body>
</html>
